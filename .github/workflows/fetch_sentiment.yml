name: Fetch Market Sentiment

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: "python:in.stock.sentiment.githubactions:v1.0"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/main.py

      - name: Commit and Push Feeds
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/feeds/sentiment_rss.xml data/feeds/history.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Pull latest changes from remote and rebase local commits on top
            git pull --rebase origin master
            git commit -m "Auto-update sentiment RSS feed and history"
            git push
          fi

      - name: Send Telegram Notification
        if: success() || failure() # Send notification on success or failure
        run: |
          python -c "from src.utils.notifier import send_telegram_notification; send_telegram_notification('Market sentiment pipeline run completed. Status: ${{ job.status }}')"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
